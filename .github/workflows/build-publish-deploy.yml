name: Build, Publish Docker image and Deploy to GKE

on:
  push:
    branches:
    - 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

    - name: code checkout
      uses: actions/checkout@v2

    - name: install the gcloud cli
      uses: google-github-actions/setup-gcloud@v0
      with:
        project_id: ${{ secrets.WIZ_GC_PROJECT }}
        service_account_key: ${{ secrets.WIZ_GC_SA_KEY }}
        install_components: 'gke-gcloud-auth-plugin'
        export_default_credentials: true

    - name: build and push the docker image
      env:
        GOOGLE_PROJECT: ${{ secrets.WIZ_GC_PROJECT }}
      run: |
        gcloud auth configure-docker us-west1-docker.pkg.dev
        docker build -t us-west1-docker.pkg.dev/$GOOGLE_PROJECT/docker-repo/tasky:latest .
        docker push us-west1-docker.pkg.dev/$GOOGLE_PROJECT/docker-repo/tasky:latest

    - name: deploy to gke
      env:
        GOOGLE_PROJECT: ${{ secrets.WIZ_GC_PROJECT }}
      run: |
        gcloud container clusters get-credentials kkap-terra-st-cluster --zone us-west1-a --project $GOOGLE_PROJECT
        sed -i "s/GOOGLE_PROJECT/$GOOGLE_PROJECT/g" gke-tasky-config.yaml
        kubectl apply -f gke-tasky-config.yaml